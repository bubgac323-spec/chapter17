<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chapter 17 - Shifo's Birthday Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a0a0c;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 600px;
            background: #111116;
            border: 4px solid #ff007f;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.4);
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #1a1a24, #08080c);
        }
        .ui-element {
            position: absolute;
            font-weight: bold;
            text-shadow: 2px 2px #000;
            pointer-events: none;
        }
        #scoreBoard {
            top: 20px;
            left: 20px;
            font-size: 20px;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }
        #instructions {
            bottom: 80px;
            width: 100%;
            text-align: center;
            font-size: 16px;
            color: #ff007f;
            text-shadow: 0 0 8px rgba(255, 0, 127, 0.4);
            animation: blink 1.2s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(8, 8, 12, 0.95);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
        }
        h1 {
            margin-bottom: 15px;
            font-size: 32px;
            font-weight: 800;
        }
        #gameOverScreen h1 {
            color: #ff3333;
            text-shadow: 0 0 15px rgba(255, 51, 51, 0.6);
        }
        #winScreen h1 {
            color: #00ffcc;
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.6);
        }
        p {
            font-size: 19px;
            margin-bottom: 30px;
            line-height: 1.6;
            direction: rtl;
        }
        button {
            background: linear-gradient(45deg, #ff007f, #ff00ab);
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px #99004c, 0 0 15px rgba(255, 0, 127, 0.4);
            font-weight: bold;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        button:active {
            transform: translateY(3px);
            box-shadow: 0 2px #99004c, 0 0 10px rgba(255, 0, 127, 0.4);
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="scoreBoard" class="ui-element">Bricks: 0 / 17</div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <div id="instructions" class="ui-element">Tap Screen to Launch! 🚀<br><span style="font-size: 13px; color:#aaa;">Drag to move paddle</span></div>

    <!-- شاشة الخسارة -->
    <div id="gameOverScreen" class="screen">
        <h1>Wasted! 💀</h1>
        <p>شريف لسة محشور فال 16 سنة 💔</p>
        <button onclick="resetGame()">Try Again</button>
    </div>

    <!-- شاشة الفوز -->
    <div id="winScreen" class="screen">
        <h1>Chapter 17 Unlocked! 🎉</h1>
        <p>شريف بقا 17 سنة 🥳</p>
        <button onclick="resetGame()">Play Again</button>
    </div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const winScreen = document.getElementById("winScreen");
    const gameOverScreen = document.getElementById("gameOverScreen");
    const scoreBoard = document.getElementById("scoreBoard");
    const instructions = document.getElementById("instructions");

    let isPlaying = true;
    let isBallSticky = true; 
    let score = 0;

    // تحميل صورة شريف للكورة
    let isImgLoaded = false;
    const ballImg = new Image();
    ballImg.src = "shifo.png"; 
    ballImg.onload = () => {
        isImgLoaded = true;
    };

    // المضرب (مكبر لـ 130 لسهولة اللعب)
    const paddle = {
        width: 130, 
        height: 14,
        x: 135,
        y: 530,
        color: "#ff007f"
    };

    let balls = [];

    function initBalls() {
        balls = [{
            x: 200,
            y: 515,
            radius: 15, 
            dx: 4,
            dy: -4,
            speed: 5.5,
            color: "#ffffff"
        }];
    }

    // البلوكات (17 بلوكة بنفس تقسيم الألوان القديم)
    const brickRows = 3;
    const brickCols = 6; 
    const brickWidth = 54;
    const brickHeight = 20;
    const brickPadding = 8;
    const brickOffsetTop = 80;
    const brickOffsetLeft = 18;

    let bricks = [];

    function initBricks() {
        bricks = [];
        let count = 0;
        for (let r = 0; r < brickRows; r++) {
            for (let c = 0; c < brickCols; c++) {
                if (count < 17) { 
                    bricks.push({
                        x: c * (brickWidth + brickPadding) + brickOffsetLeft,
                        y: r * (brickHeight + brickPadding) + brickOffsetTop,
                        status: 1,
                        // الصف الأول بينك، الثاني سيان (لبني)، الثالث أصفر
                        color: r === 0 ? "#ff007f" : r === 1 ? "#00ffcc" : "#ffcc00"
                    });
                    count++;
                }
            }
        }
    }

    // حل مشكلة تباعد المستطيل عن الصباع بالـ Scaling المظبوط
    function handleMove(clientX) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = 400 / rect.width; // تحويل بكسلات الشاشة لبكسلات اللعبة الداخلية
        const relativeX = (clientX - rect.left) * scaleX;
        
        paddle.x = relativeX - paddle.width / 2;
        
        if (paddle.x < 0) paddle.x = 0;
        if (paddle.x > 400 - paddle.width) paddle.x = 400 - paddle.width;

        if (isBallSticky && balls.length > 0) {
            balls[0].x = paddle.x + paddle.width / 2;
        }
    }

    canvas.addEventListener("mousemove", (e) => handleMove(e.clientX));
    canvas.addEventListener("touchmove", (e) => {
        e.preventDefault();
        handleMove(e.touches[0].clientX);
    }, { passive: false });

    canvas.addEventListener("touchstart", (e) => {
        e.preventDefault();
        handleMove(e.touches[0].clientX);
        releaseBall();
    }, { passive: false });

    canvas.addEventListener("click", releaseBall);

    function releaseBall() {
        if (isBallSticky && isPlaying) {
            isBallSticky = false;
            instructions.style.display = "none";
        }
    }

    function spawnExtraBall(x, y) {
        balls.push({
            x: x,
            y: y,
            radius: 15,
            dx: (Math.random() > 0.5 ? 3.5 : -3.5),
            dy: -4,
            speed: 5.5,
            color: "#ffffff"
        });
    }

    function update() {
        if (!isPlaying) return;
        if (isBallSticky) return;

        for (let i = balls.length - 1; i >= 0; i--) {
            let ball = balls[i];
            ball.x += ball.dx;
            ball.y += ball.dy;

            // الارتداد من الحوائط
            if (ball.x - ball.radius < 0) {
                ball.x = ball.radius;
                ball.dx = -ball.dx;
            }
            if (ball.x + ball.radius > 400) {
                ball.x = 400 - ball.radius;
                ball.dx = -ball.dx;
            }
            if (ball.y - ball.radius < 0) {
                ball.y = ball.radius;
                ball.dy = -ball.dy;
            }

            // نظام اصطدام آمن يمنع اختراق المضرب نهائياً
            if (
                ball.dy > 0 && 
                ball.y + ball.radius >= paddle.y &&
                ball.y - ball.radius <= paddle.y + paddle.height &&
                ball.x + ball.radius >= paddle.x &&
                ball.x - ball.radius <= paddle.x + paddle.width
            ) {
                ball.y = paddle.y - ball.radius; // رفع الكورة فوق المضرب فوراً
                let hitPoint = ball.x - (paddle.x + paddle.width / 2);
                let normalizedHitPoint = hitPoint / (paddle.width / 2); 
                
                // تحديد زاوية ارتداد آمنة
                if (normalizedHitPoint > 0.8) normalizedHitPoint = 0.8;
                if (normalizedHitPoint < -0.8) normalizedHitPoint = -0.8;
                
                let angle = normalizedHitPoint * (Math.PI / 3); 

                ball.dx = ball.speed * Math.sin(angle);
                ball.dy = -ball.speed * Math.cos(angle);
            }

            // اصطدام البلوكات مع ارتداد فيزكس طبيعي
            for (let j = 0; j < bricks.length; j++) {
                let b = bricks[j];
                if (b.status === 1) {
                    if (
                        ball.x + ball.radius > b.x &&
                        ball.x - ball.radius < b.x + brickWidth &&
                        ball.y + ball.radius > b.y &&
                        ball.y - ball.radius < b.y + brickHeight
                    ) {
                        // ارتداد ذكي بناءً على اتجاه الكورة قبل الاصطدام
                        let prevY = ball.y - ball.dy;
                        if (prevY + ball.radius <= b.y || prevY - ball.radius >= b.y + brickHeight) {
                            ball.dy = -ball.dy;
                        } else {
                            ball.dx = -ball.dx;
                        }

                        b.status = 0; 
                        score++;
                        scoreBoard.innerText = `Bricks: ${score} / 17`;

                        // مهارة زيادة الكور (تنزيل كورة إضافية بحد أقصى 3 كور)
                        if (score < 17 && balls.length < 3) {
                            spawnExtraBall(ball.x, ball.y);
                        }

                        if (score === 17) {
                            win();
                            return;
                        }
                        break; 
                    }
                }
            }

            // سقوط الكورة
            if (ball.y - ball.radius > 600) {
                balls.splice(i, 1);
                if (balls.length === 0) {
                    gameOver();
                    return;
                }
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, 400, 600);

        // رسم البلوكات الملونة بالألوان المطلوبة
        for (let i = 0; i < bricks.length; i++) {
            let b = bricks[i];
            if (b.status === 1) {
                ctx.fillStyle = b.color;
                ctx.shadowColor = b.color;
                ctx.shadowBlur = 8;
                ctx.fillRect(b.x, b.y, brickWidth, brickHeight);
                ctx.shadowBlur = 0; 
            }
        }

        // رسم المضرب
        ctx.fillStyle = paddle.color;
        ctx.shadowColor = paddle.color;
        ctx.shadowBlur = 12;
        ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
        ctx.shadowBlur = 0;

        // رسم الكور بشكل دائري احترافي
        balls.forEach(ball => {
            if (isImgLoaded) {
                ctx.save();
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
                ctx.closePath();
                ctx.clip(); 
                ctx.drawImage(ballImg, ball.x - ball.radius, ball.y - ball.radius, ball.radius * 2, ball.radius * 2);
                ctx.restore();
            } else {
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
                ctx.fillStyle = ball.color;
                ctx.shadowColor = "#ffffff";
                ctx.shadowBlur = 10;
                ctx.fill();
                ctx.closePath();
                ctx.shadowBlur = 0;
            }
        });
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    function gameOver() {
        isPlaying = false;
        gameOverScreen.style.display = "flex";
    }

    function win() {
        isPlaying = false;
        winScreen.style.display = "flex";
    }

    function resetGame() {
        score = 0;
        scoreBoard.innerText = `Bricks: ${score} / 17`;
        initBricks();
        initBalls();
        isBallSticky = true;
        isPlaying = true;
        paddle.x = 135;
        gameOverScreen.style.display = "none";
        winScreen.style.display = "none";
        instructions.style.display = "block";
    }

    initBricks();
    initBalls();
    gameLoop();
</script>
</body>
</html>
