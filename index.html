<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chapter 17 - V2</title>
    <style>
        body { margin: 0; padding: 0; background: #0d0d0d; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; color: #fff; overflow: hidden; }
        #gameContainer { position: relative; width: 100%; max-width: 400px; height: 600px; background: #151515; border: 4px solid #ff007f; border-radius: 15px; box-shadow: 0 0 25px rgba(255, 0, 127, 0.6); }
        canvas { display: block; background: #000; }
        .ui { position: absolute; font-weight: bold; color: #fff; }
        #scoreBoard { top: 10px; left: 10px; font-size: 20px; }
        #version { top: 10px; right: 10px; font-size: 12px; color: #555; }
        .screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        button { background: #ff007f; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
<div id="gameContainer">
    <div id="scoreBoard" class="ui">Bricks: 0 / 17</div>
    <div id="version" class="ui">v2.0</div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    
    <div id="gameOver" class="screen">
        <h1 style="color:red">Wasted! 💀</h1>
        <p style="text-align:center">شريف لسة محشور فال 16 سنة 💔</p>
        <button onclick="location.reload()">Try Again</button>
    </div>
    
    <div id="winScreen" class="screen">
        <h1 style="color:#00ffcc">Chapter 17! 🎉</h1>
        <p style="text-align:center">شريف بقا 17 سنة شكرا يعالمي 🥳</p>
        <button onclick="location.reload()">Play Again</button>
    </div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const paddle = { x: 135, y: 520, w: 130, h: 15 };
    let balls = [{x: 200, y: 500, dx: 3, dy: -3, r: 10}];
    let bricks = [], score = 0, isRunning = true;

    // تهيئة البلوكات
    for(let r=0; r<3; r++) for(let c=0; c<6; c++) if(bricks.length < 17) bricks.push({x: c*60 + 25, y: r*30 + 50, w: 50, h: 20, active: true});

    canvas.addEventListener("touchmove", e => {
        paddle.x = e.touches[0].clientX - 200 - paddle.w/2;
    });

    function update() {
        if(!isRunning) return;
        balls.forEach((b, i) => {
            b.x += b.dx; b.y += b.dy;
            if(b.x < 0 || b.x > 400) b.dx *= -1;
            if(b.y < 0) b.dy *= -1;
            if(b.y > b.y + 15 && b.x > paddle.x && b.x < paddle.x + paddle.w && b.y > paddle.y) b.dy *= -1;
            
            bricks.forEach(brick => {
                if(brick.active && b.x > brick.x && b.x < brick.x + brick.w && b.y > brick.y && b.y < brick.y + brick.h) {
                    brick.active = false; b.dy *= -1; score++;
                    document.getElementById("scoreBoard").innerText = `Bricks: ${score} / 17`;
                    if(balls.length < 3) balls.push({x: b.x, y: b.y, dx: -b.dx, dy: 3, r: 10});
                    if(score === 17) document.getElementById("winScreen").style.display = "flex";
                }
            });
            if(b.y > 600) { balls.splice(i, 1); if(balls.length === 0) document.getElementById("gameOver").style.display = "flex"; }
        });
    }

    function draw() {
        ctx.clearRect(0,0,400,600);
        ctx.fillStyle = "#ff007f"; ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
        bricks.forEach(b => { if(b.active) { ctx.fillStyle = "#00ffcc"; ctx.fillRect(b.x, b.y, b.w, b.h); } });
        balls.forEach(b => { ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill(); });
        requestAnimationFrame(() => { update(); draw(); });
    }
    draw();
</script>
</body>
</html>
