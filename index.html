<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chapter 17 - Shifo's Birthday Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #121212;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 600px;
            background: #1e1e1e;
            border: 4px solid #ff007f;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.5);
            overflow: hidden;
        }
        canvas {
            display: block;
            background: linear-gradient(to bottom, #111, #222);
        }
        .ui-element {
            position: absolute;
            font-weight: bold;
            text-shadow: 2px 2px #000;
        }
        #scoreBoard {
            top: 20px;
            left: 20px;
            font-size: 24px;
            color: #00ffcc;
        }
        #instructions {
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 16px;
            color: #aaa;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        #winScreen, #gameOverScreen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        h1 {
            color: #ff007f;
            margin-bottom: 10px;
            font-size: 32px;
        }
        p {
            font-size: 18px;
            margin-bottom: 20px;
        }
        button {
            background: #ff007f;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px #99004c;
        }
        button:active {
            box-shadow: 0 2px #99004c;
            transform: translateY(3px);
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="scoreBoard" class="ui-element">Score: 0 / 17</div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <div id="instructions" class="ui-element">Tap Screen to Jump!</div>

    <!-- شاشة الخسارة -->
    <div id="gameOverScreen">
        <h1>Wasted! 💀</h1>
        <p>محققتش الـ 17 سنة لسه! حاول تاني</p>
        <button onclick="resetGame()">Retry</button>
    </div>

    <!-- شاشة الفوز بالـ 17 -->
    <div id="winScreen">
        <h1>Chapter 17 Unlocked! 🎉</h1>
        <p>كل سنة وأنت طيب يا شيفو! 🎂<br>شكراً إنك لعبت وشاركتني اللحظة دي ❤️</p>
        <button onclick="resetGame()">Play Again</button>
    </div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const winScreen = document.getElementById("winScreen");
    const gameOverScreen = document.getElementById("gameOverScreen");
    const scoreBoard = document.getElementById("scoreBoard");

    let isPlaying = true;
    let score = 0;

    // كائن اللاعب (الشخصية)
    const player = {
        x: 50,
        y: 400,
        width: 40,
        height: 40,
        color: "#ff007f",
        gravity: 0.6,
        jumpPower: -12,
        velocity: 0,
        isGrounded: false
    };

    // كائن العقبة
    const obstacle = {
        x: 450,
        y: 400,
        width: 30,
        height: 40,
        color: "#00ffcc",
        speed: 5
    };

    // خط الأرضية
    const groundY = 440;

    function jump() {
        if (player.isGrounded && isPlaying) {
            player.velocity = player.jumpPower;
            player.isGrounded = false;
        }
    }

    // التحكم باللمس والكي بورد
    document.addEventListener("keydown", function(e) {
        if (e.code === "Space") jump();
    });
    canvas.addEventListener("touchstart", function(e) {
        e.preventDefault();
        jump();
    });

    function update() {
        if (!isPlaying) return;

        // فيزياء اللاعب
        player.velocity += player.gravity;
        player.y += player.velocity;

        if (player.y >= groundY - player.height) {
            player.y = groundY - player.height;
            player.velocity = 0;
            player.isGrounded = true;
        }

        // حركة العقبة
        obstacle.x -= obstacle.speed;
        if (obstacle.x < -obstacle.width) {
            obstacle.x = 450;
            score++;
            scoreBoard.innerText = `Score: ${score} / 17`;
            
            // زيادة الصعوبة تدريجياً
            obstacle.speed += 0.3;

            // شرط الفوز
            if (score >= 17) {
                win();
            }
        }

        // كشف التصادم
        if (
            player.x < obstacle.x + obstacle.width &&
            player.x + player.width > obstacle.x &&
            player.y < obstacle.y + obstacle.height &&
            player.y + player.height > obstacle.y
        ) {
            gameOver();
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // رسم الأرضية
        ctx.fillStyle = "#333";
        ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);

        // رسم اللاعب (تقدر تبدله بإيموجي أو صورة لاحقاً)
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x, player.y, player.width, player.height);
        // إضافة عين صغيرة للشكل الجمالي
        ctx.fillStyle = "#fff";
        ctx.fillRect(player.x + 25, player.y + 10, 8, 8);

        // رسم العقبة (شكل صبارة أو مثلث)
        ctx.fillStyle = obstacle.color;
        ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    function gameOver() {
        isPlaying = false;
        gameOverScreen.style.display = "flex";
    }

    function win() {
        isPlaying = false;
        winScreen.style.display = "flex";
    }

    function resetGame() {
        score = 0;
        scoreBoard.innerText = `Score: ${score} / 17`;
        obstacle.x = 450;
        obstacle.speed = 5;
        player.y = groundY - player.height;
        player.velocity = 0;
        player.isGrounded = true;
        gameOverScreen.style.display = "none";
        winScreen.style.display = "none";
        isPlaying = true;
    }

    // ابدأ اللعبة علطول
    gameLoop();
</script>
</body>
</html>
